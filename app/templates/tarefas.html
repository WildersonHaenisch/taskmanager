<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tarefas - TaskManager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</head>
<body>
    <div class="container">
        <h2>Minhas Tarefas</h2>
        <form id="task-form" method="POST" action="/add">
            <input type="text" name="task" placeholder="Digite sua tarefa" required>
            <button type="submit">Adicionar</button>
        </form>
        
        <ul id="task-list">
            {% for task in tasks %}
            <li class="{{ 'done' if task.completed else '' }}">
                {{ task.name }}
                <a href="/toggle/{{ task.id }}">[✔]</a>
            </li>
            {% endfor %}
        </ul>
        <a href="/logout">Sair</a>
    </div>
</body>
</html>
